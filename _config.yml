remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dark"

title: "Wajid Hussain"
name: "Wajid Hussain"
description: "Wajid Hussain's personal website showcasing projects and experiences in IoT, embedded systems, and data science."
url: "https://wajidengg.github.io"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

author:
  name: "Wajid Hussain"
  avatar: "/assets/img/headshot_circle.png"
  bio: "Electrical Engineer transitioning to IoT and Data Science"
  location: "Toronto, Canada"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:wajidengg@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/wajidengg"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/whussain"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
